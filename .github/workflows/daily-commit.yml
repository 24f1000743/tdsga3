name: Daily Repository Update

on:
  schedule:
    - cron: '12 4 * * *'
  workflow_dispatch:

permissions:
  contents: write   # ⭐ THIS FIXES EXIT CODE 128

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update file - 24f1000743@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f1000743@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push origin HEAD:main
